<title>SUPERBOOTH26 – Full Event Schedule</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --col-time:52px;--row-h:20px;--hdr-h:52px;--fs:9px;
  --font:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace;--font-display:'Bebas Neue',cursive;
  --bg:#0f0f10;--surface:#171719;--surface2:#1e1e21;--border:#2a2a2e;--border2:#38383e;
  --text:#e8e8ec;--text-muted:#6a6a74;--text-dim:#3f3f46;
  --c-stage:#f0c040;--f-stage:#1e1800;--b-stage:#f0c040;
  --c-workshop:#3dd8a0;--f-workshop:#001a12;--b-workshop:#3dd8a0;
  --c-diy:#ff6b6b;--f-diy:#200808;--b-diy:#ff6b6b;
  --c-ambient:#7eb8f7;--f-ambient:#06101e;--b-ambient:#7eb8f7;
  --c-radio:#a78bfa;--f-radio:#100a20;--b-radio:#a78bfa;
  --c-evening:#fb923c;--f-evening:#1e0a00;--b-evening:#fb923c;
  --c-misc:#94a3b8;--f-misc:#0e1117;--b-misc:#94a3b8;
  --accent:#f0c040;
}
html.light{
  --bg:#f4f3ef;--surface:#ffffff;--surface2:#f0efe9;--border:#d8d7d0;--border2:#c4c3ba;
  --text:#1a1a1c;--text-muted:#72716c;--text-dim:#c8c7c0;
  --c-stage:#9a7000;--f-stage:#fef9e8;--b-stage:#c8960a;
  --c-workshop:#0f7a54;--f-workshop:#eafaf4;--b-workshop:#1aaa73;
  --c-diy:#c0313a;--f-diy:#fdeaea;--b-diy:#e04048;
  --c-ambient:#1a5ea0;--f-ambient:#eaf2fd;--b-ambient:#2474cc;
  --c-radio:#5b3fa8;--f-radio:#f2edfd;--b-radio:#7c5dc8;
  --c-evening:#b84a0a;--f-evening:#fff0e8;--b-evening:#e06020;
  --c-misc:#48596a;--f-misc:#eceff3;--b-misc:#6a7e90;
}
body{font-family:var(--font);font-size:var(--fs);background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s}
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
.header-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
.brand{display:flex;align-items:baseline;gap:12px}
.brand h1{font-family:var(--font-display);font-size:28px;letter-spacing:.04em;color:var(--text);line-height:1}
.brand .year{font-family:var(--font-display);font-size:28px;color:var(--accent);line-height:1}
.brand .venue{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase}
.header-controls{display:flex;align-items:center;gap:8px}
#theme-btn{background:none;border:1px solid var(--border2);color:var(--text-muted);cursor:pointer;padding:5px 10px;border-radius:6px;font-size:14px;line-height:1;transition:all .15s}
#theme-btn:hover{border-color:var(--accent);color:var(--accent)}
.tabs{display:flex;gap:0}
.tab{padding:10px 24px;cursor:pointer;background:none;color:var(--text-muted);font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;border:none;border-bottom:2px solid transparent;transition:all .15s;position:relative;bottom:-1px}
.tab:hover:not(.active){color:var(--text);border-bottom-color:var(--border2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.legend-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.li{display:flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:9px;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase}
.ld{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.page-wrap{display:none;padding:0}
.page-wrap.active{display:block}
.grid-scroll{overflow-x:auto;padding:0 0 24px}
.grid{display:grid;border-top:1px solid var(--border);border-left:1px solid var(--border);min-width:900px}
.cell-hdr-time{height:var(--hdr-h);background:var(--surface);color:var(--text-dim);font-family:var(--font-mono);font-size:8px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border2);position:sticky;left:0;z-index:10}
.cell-hdr{height:var(--hdr-h);background:var(--surface);color:var(--text);font-size:9px;font-weight:600;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4px;border-right:1px solid var(--border);border-bottom:1px solid var(--border2);line-height:1.3;gap:2px;letter-spacing:.01em}
.cell-hdr .vc{font-family:var(--font-mono);font-size:7.5px;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;font-weight:400}
.cell-time{background:var(--surface);border-right:1px solid var(--border2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;padding-right:7px;font-family:var(--font-mono);font-size:8px;font-weight:400;color:var(--text-dim);height:var(--row-h);position:sticky;left:0;z-index:2;transition:background .2s}
.cell-time.hr{color:var(--text-muted);font-weight:500;font-size:9px;border-bottom:1px solid var(--border2);background:var(--surface2)}
.cell-time.hf{font-size:7.5px;color:var(--text-dim)}
.cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);height:var(--row-h);min-width:0}
.cell.hb{border-bottom-color:var(--border2)}
.event{border-right:1px solid var(--border);border-bottom:1px solid rgba(0,0,0,.2);padding:2px 4px;overflow:hidden;min-width:0;transition:filter .1s}
.event:hover{filter:brightness(1.12)}
.event a{display:block;text-decoration:none;color:inherit;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:var(--fs);font-weight:500;letter-spacing:.01em}
.event.so{opacity:.45}
.event.cx{opacity:.3;text-decoration:line-through}
.cat-stage{background:var(--f-stage);border-left:2.5px solid var(--b-stage);color:var(--c-stage)}
.cat-workshop{background:var(--f-workshop);border-left:2.5px solid var(--b-workshop);color:var(--c-workshop)}
.cat-diy{background:var(--f-diy);border-left:2.5px solid var(--b-diy);color:var(--c-diy)}
.cat-ambient{background:var(--f-ambient);border-left:2.5px solid var(--b-ambient);color:var(--c-ambient)}
.cat-radio{background:var(--f-radio);border-left:2.5px solid var(--b-radio);color:var(--c-radio)}
.cat-evening{background:var(--f-evening);border-left:2.5px solid var(--b-evening);color:var(--c-evening)}
.cat-misc{background:var(--f-misc);border-left:2.5px solid var(--b-misc);color:var(--c-misc)}
@media print{
  @page{size:A4 landscape;margin:7mm}
  .app-header,.legend-bar{position:static;display:block}
  .tabs{display:none}
  body{background:#fff;font-size:7pt;color:#111}
  .page-wrap{display:block!important;page-break-after:always}
  .page-wrap:last-child{page-break-after:auto}
  :root{--col-time:40px;--row-h:14px;--hdr-h:36px;--fs:6pt}
  .cell-hdr,.event a{font-size:5.5pt}
  a::after{content:none!important}
}
</style>
</head>

function toMins(t){const[h,m]=t.split(':').map(Number);return h*60+m}
function snap15(m){return Math.round(m/15)*15}
function buildGrid(containerId,events){
  const grid=document.getElementById(containerId);
  const START=toMins('10:00'),END=toMins('21:15');
  const slots=[];for(let m=START;m<END;m+=15)slots.push(m);
  const N=slots.length;
  const mapped=events.map(e=>{const sm=snap15(toMins(e[0]));const em=snap15(toMins(e[1]));const ri=slots.indexOf(sm);const ei=slots.indexOf(em);const span=Math.max(1,(ei<0?N:ei)-ri);return{row:ri<0?0:ri,span,col:e[2],title:e[3],url:e[4],cat:e[5],so:e[6],cx:e[7]};});
  const htc=document.createElement('div');htc.className='cell-hdr-time';htc.style.cssText='grid-row:1;grid-column:1';htc.textContent='TIME';grid.appendChild(htc);
  VENUES.forEach((v,i)=>{const h=document.createElement('div');h.className='cell-hdr';h.style.cssText=`grid-row:1;grid-column:${i+2}`;h.innerHTML=`<span>${v[0]}</span><span class="vc">${v[1]}</span>`;grid.appendChild(h);});
  const occ={};for(let c=1;c<=12;c++)occ[c]={};mapped.forEach(e=>{for(let r=e.row;r<e.row+e.span;r++)occ[e.col][r]=true});
  for(let ri=0;ri<N;ri++){
    const mins=slots[ri];const h=Math.floor(mins/60),m=mins%60;const isHr=m===0,isHf=m===30;
    const label=isHr?`${String(h).padStart(2,'0')}:00`:isHf?`${String(h).padStart(2,'0')}:30`:'';
    const tc=document.createElement('div');tc.className='cell-time'+(isHr?' hr':isHf?' hf':'');tc.style.cssText=`grid-row:${ri+2};grid-column:1`;tc.textContent=label;grid.appendChild(tc);
    for(let col=1;col<=12;col++){
      const spanning=mapped.find(e=>e.col===col&&e.row<ri&&e.row+e.span>ri);if(spanning)continue;
      const here=mapped.filter(e=>e.col===col&&e.row===ri);
      if(here.length===0){const c=document.createElement('div');c.className='cell'+(isHr?' hb':'');c.style.cssText=`grid-row:${ri+2};grid-column:${col+1}`;grid.appendChild(c);}
      else if(here.length===1){const e=here[0];const c=document.createElement('div');c.className=`event cat-${e.cat}${e.so?' so':''}${e.cx?' cx':''}`;c.style.cssText=`grid-row:${ri+2}/span ${e.span};grid-column:${col+1}`;c.innerHTML=`<a href="${e.url}" target="_blank" title="${e.title}">${e.title}</a>`;grid.appendChild(c);}
      else{const maxSpan=Math.max(...here.map(e=>e.span));const w=document.createElement('div');w.style.cssText=`grid-row:${ri+2}/span ${maxSpan};grid-column:${col+1};display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden`;here.forEach((e,i)=>{const s=document.createElement('div');s.className=`event cat-${e.cat}${e.so?' so':''}${e.cx?' cx':''}`;s.style.cssText=`flex:1;border-right:none;${i>0?'border-top:1px dashed rgba(255,255,255,.08)':''}`;s.innerHTML=`<a href="${e.url}" target="_blank" title="${e.title}">${e.title}</a>`;w.appendChild(s);});grid.appendChild(w);}
    }
  }
}
